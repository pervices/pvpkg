# Updates for Gnu Radio
#net.core.rmem_max = 50000000
#net.core.wmem_max = 2500000
#kernel.shmmax = 2147483648

#My values
net.core.rmem_max = 500000000
net.core.wmem_max = 500000000
kernel.shmmax = 2147483648

# Set the number of hugepages to use. This value should be adjusted based on the available memory in the system and the amount required by UHD.
# The size of the UHD buffers can be calculated as ``num_sdr_channels * packet_buffer_size * (ceil(payload_len/512)*512+512)``. Assuming payload_len=7686 and num_sdr_channels=8:
# size of buffers = 8*32768*8192 = 2147483648 Bytes. So the minimum number of 2048kB hugepages needed are ``8channels*2147483648Bytes/2097152Bytes=8192hugepages``.
vm.nr_hugepages=8192


